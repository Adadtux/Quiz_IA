<!doctype html>
<html lang="pt-BR" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz IA</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&amp;family=DM+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
  <style>
    html, body { height: 100%; margin: 0; }
    .font-display { font-family: 'Playfair Display', Georgia, serif; }
    .font-body { font-family: 'DM Sans', sans-serif; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }
    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }
    .anim-fade-up { animation: fadeUp 0.6s cubic-bezier(0.16,1,0.3,1) forwards; }
    .anim-scale-in { animation: scaleIn 0.5s cubic-bezier(0.16,1,0.3,1) forwards; }
    .delay-1 { animation-delay: 0.1s; }
    .delay-2 { animation-delay: 0.2s; }
    .delay-3 { animation-delay: 0.3s; }
    .delay-4 { animation-delay: 0.4s; }

    .option-btn {
      transition: all 0.3s cubic-bezier(0.16,1,0.3,1);
      position: relative;
      overflow: hidden;
    }
    .option-btn::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
      background-size: 200% 100%;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .option-btn:hover::before { opacity: 1; animation: shimmer 1.5s infinite; }
    .option-btn:hover { transform: translateX(6px); }
    .option-btn.correct { background: #059669 !important; border-color: #059669 !important; color: #fff !important; transform: scale(1.02); }
    .option-btn.wrong { background: #dc2626 !important; border-color: #dc2626 !important; color: #fff !important; }
    .option-btn.disabled { pointer-events: none; opacity: 0.5; }
    .option-btn.disabled.correct { opacity: 1; }

    .progress-fill {
      transition: width 0.6s cubic-bezier(0.16,1,0.3,1);
    }

    .grain-overlay {
      position: fixed; inset: 0; pointer-events: none; z-index: 50;
      opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    }

    .result-bar {
      transition: width 1s cubic-bezier(0.16,1,0.3,1);
    }
  </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full font-body" style="background: #0a0a0f;">
  <div class="grain-overlay"></div>
  <div id="app" class="h-full w-full overflow-auto" style="background: linear-gradient(160deg, #0a0a0f 0%, #111827 50%, #0f172a 100%);"><!-- START SCREEN -->
   <div id="start-screen" class="flex items-center justify-center h-full px-4">
    <div class="text-center max-w-lg mx-auto anim-scale-in">
     <div class="mb-8">
      <div class="inline-flex items-center justify-center w-20 h-20 rounded-2xl mb-6" style="background: linear-gradient(135deg, #d4a574, #c2956b); box-shadow: 0 0 60px rgba(212,165,116,0.2);"><span class="text-3xl">✝️</span>
      </div>
      <h1 id="main-title" class="font-display text-5xl md:text-6xl font-black text-white mb-4 leading-tight">Quiz IA</h1>
      <p class="text-lg" style="color: #94a3b8;">Ética, Inteligência Artificial e Dignidade Humana</p>
     </div>
     <div class="flex items-center justify-center gap-6 mb-10 text-sm" style="color: #64748b;"><span class="flex items-center gap-2"><i data-lucide="help-circle" style="width:16px;height:16px;"></i> 3 questões</span> <span class="flex items-center gap-2"><i data-lucide="clock" style="width:16px;height:16px;"></i> ~2 min</span>
     </div><button onclick="startQuiz()" class="inline-flex items-center gap-3 px-8 py-4 rounded-xl text-base font-semibold text-white transition-all hover:scale-105 hover:shadow-lg" style="background: linear-gradient(135deg, #d4a574, #b8875a); box-shadow: 0 4px 30px rgba(212,165,116,0.3);"> Começar Quiz <i data-lucide="arrow-right" style="width:20px;height:20px;"></i> </button>
    </div>
   </div><!-- QUIZ SCREEN -->
   <div id="quiz-screen" class="hidden h-full flex flex-col"><!-- Header -->
    <header class="px-6 pt-6 pb-4">
     <div class="max-w-2xl mx-auto">
      <div class="flex items-center justify-between mb-3"><span id="q-counter" class="text-sm font-semibold" style="color: #d4a574;">Questão 1 de 3</span> <span id="score-display" class="text-sm font-medium" style="color: #64748b;">0 acertos</span>
      </div>
      <div class="w-full h-1.5 rounded-full" style="background: #1e293b;">
       <div id="progress-bar" class="progress-fill h-full rounded-full" style="width: 0%; background: linear-gradient(90deg, #d4a574, #e8c9a0);"></div>
      </div>
     </div>
    </header><!-- Question Area -->
    <div class="flex-1 flex items-center px-6 py-4">
     <div class="max-w-2xl mx-auto w-full">
      <div id="question-card" class="anim-fade-up">
       <p id="question-number" class="text-sm font-bold mb-3 tracking-widest uppercase" style="color: #d4a574;">01</p>
       <h2 id="question-text" class="font-display text-2xl md:text-3xl font-bold text-white mb-8 leading-snug"></h2>
       <div id="options-container" class="space-y-3"></div><!-- Feedback -->
       <div id="feedback" class="hidden mt-6 p-4 rounded-xl anim-scale-in" style="background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08);">
        <p id="feedback-icon" class="text-lg mb-1"></p>
        <p id="feedback-text" class="text-sm" style="color: #cbd5e1;"></p>
       </div>
       <div id="next-btn-wrap" class="hidden mt-6 text-right anim-fade-up"><button onclick="nextQuestion()" id="next-btn" class="inline-flex items-center gap-2 px-6 py-3 rounded-xl text-sm font-semibold text-white transition-all hover:scale-105" style="background: linear-gradient(135deg, #d4a574, #b8875a);"> Próxima <i data-lucide="arrow-right" style="width:16px;height:16px;"></i> </button>
       </div>
      </div>
     </div>
    </div>
   </div><!-- RESULT SCREEN -->
   <div id="result-screen" class="hidden h-full flex items-center justify-center px-4">
    <div class="max-w-lg mx-auto w-full text-center anim-scale-in">
     <div id="result-emoji" class="text-6xl mb-4"></div>
     <h2 class="font-display text-4xl md:text-5xl font-black text-white mb-2">Resultado</h2>
     <p id="result-summary" class="text-lg mb-8" style="color: #94a3b8;"></p><!-- Score Ring -->
     <div class="inline-flex items-center justify-center w-36 h-36 rounded-full mb-8 relative" style="background: rgba(255,255,255,0.03); border: 2px solid rgba(212,165,116,0.2);">
      <div>
       <p id="result-score" class="font-display text-5xl font-black" style="color: #d4a574;"></p>
       <p class="text-xs font-medium" style="color: #64748b;">de 3</p>
      </div>
     </div><!-- Per-question breakdown -->
     <div id="result-breakdown" class="space-y-3 mb-10 text-left"></div><button onclick="restartQuiz()" class="inline-flex items-center gap-2 px-8 py-4 rounded-xl text-base font-semibold text-white transition-all hover:scale-105" style="background: linear-gradient(135deg, #d4a574, #b8875a); box-shadow: 0 4px 30px rgba(212,165,116,0.3);"> <i data-lucide="rotate-ccw" style="width:18px;height:18px;"></i> Refazer Quiz </button>
    </div>
   </div>
  </div>
  <script>
    const questions = [
      {
        q: "Se uma IA simula perfeitamente emoções humanas, o que ainda a diferencia de um humano?",
        options: ["Capacidade de aprendizado", "Ausência de experiência subjetiva", "Velocidade de processamento", "Falta de memória"],
        correct: 1
      },
      {
        q: "Qual princípio ético deveria guiar o desenvolvimento da IA?",
        options: ["Máxima inovação tecnológica", "Eficiência econômica", "Competição global", "Preservação da dignidade humana"],
        correct: 3
      },
      {
        q: "Qual é um dos maiores riscos éticos da IA generativa em comunicação?",
        options: ["Produzir textos longos demais", "Criar conteúdo persuasivo em escala massiva", "Reduzir criatividade humana", "Aumentar custo de marketing"],
        correct: 1
      }
    ];

    let current = 0, score = 0, answered = false;
    const results = [];
    const letters = ['A', 'B', 'C', 'D'];

    const defaultConfig = {
      quiz_title: 'Quiz IA',
      background_color: '#0a0a0f',
      accent_color: '#d4a574',
      text_color: '#ffffff',
      surface_color: '#1e293b',
      muted_color: '#64748b',
      font_family: 'DM Sans',
      font_size: 16
    };

    function applyConfig(config) {
      const t = document.getElementById('main-title');
      if (t) t.textContent = config.quiz_title || defaultConfig.quiz_title;
    }

    window.elementSdk.init({
      defaultConfig,
      onConfigChange: async (config) => applyConfig(config),
      mapToCapabilities: (config) => ({
        recolorables: [
          { get: () => config.background_color || defaultConfig.background_color, set: v => { config.background_color = v; window.elementSdk.setConfig({ background_color: v }); } },
          { get: () => config.surface_color || defaultConfig.surface_color, set: v => { config.surface_color = v; window.elementSdk.setConfig({ surface_color: v }); } },
          { get: () => config.text_color || defaultConfig.text_color, set: v => { config.text_color = v; window.elementSdk.setConfig({ text_color: v }); } },
          { get: () => config.accent_color || defaultConfig.accent_color, set: v => { config.accent_color = v; window.elementSdk.setConfig({ accent_color: v }); } },
          { get: () => config.muted_color || defaultConfig.muted_color, set: v => { config.muted_color = v; window.elementSdk.setConfig({ muted_color: v }); } }
        ],
        borderables: [],
        fontEditable: {
          get: () => config.font_family || defaultConfig.font_family,
          set: v => { config.font_family = v; window.elementSdk.setConfig({ font_family: v }); }
        },
        fontSizeable: {
          get: () => config.font_size || defaultConfig.font_size,
          set: v => { config.font_size = v; window.elementSdk.setConfig({ font_size: v }); }
        }
      }),
      mapToEditPanelValues: (config) => new Map([
        ['quiz_title', config.quiz_title || defaultConfig.quiz_title]
      ])
    });

    function startQuiz() {
      current = 0; score = 0; results.length = 0;
      document.getElementById('start-screen').classList.add('hidden');
      document.getElementById('quiz-screen').classList.remove('hidden');
      renderQuestion();
    }

    function renderQuestion() {
      answered = false;
      const q = questions[current];
      document.getElementById('q-counter').textContent = `Questão ${current + 1} de ${questions.length}`;
      document.getElementById('score-display').textContent = `${score} acerto${score !== 1 ? 's' : ''}`;
      document.getElementById('progress-bar').style.width = `${((current) / questions.length) * 100}%`;
      document.getElementById('question-number').textContent = String(current + 1).padStart(2, '0');
      document.getElementById('question-text').textContent = q.q;
      document.getElementById('feedback').classList.add('hidden');
      document.getElementById('next-btn-wrap').classList.add('hidden');

      const container = document.getElementById('options-container');
      container.innerHTML = '';
      q.options.forEach((opt, i) => {
        const btn = document.createElement('button');
        btn.className = `option-btn w-full text-left flex items-center gap-4 p-4 rounded-xl border anim-fade-up delay-${i + 1}`;
        btn.style.cssText = 'background: rgba(255,255,255,0.03); border-color: rgba(255,255,255,0.08); color: #e2e8f0; opacity: 0;';
        btn.innerHTML = `
          <span class="flex-shrink-0 w-9 h-9 rounded-lg flex items-center justify-center text-sm font-bold" style="background: rgba(212,165,116,0.12); color: #d4a574;">${letters[i]}</span>
          <span class="text-sm font-medium">${opt}</span>
        `;
        btn.onclick = () => selectAnswer(i);
        container.appendChild(btn);
      });
      lucide.createIcons();
    }

    function selectAnswer(index) {
      if (answered) return;
      answered = true;
      const q = questions[current];
      const isCorrect = index === q.correct;
      if (isCorrect) score++;
      results.push({ question: q.q, chosen: index, correct: q.correct, isCorrect });

      const btns = document.querySelectorAll('.option-btn');
      btns.forEach((btn, i) => {
        if (i === q.correct) btn.classList.add('correct');
        else if (i === index && !isCorrect) btn.classList.add('wrong');
        if (i !== index && i !== q.correct) btn.classList.add('disabled');
      });

      const fb = document.getElementById('feedback');
      fb.classList.remove('hidden');
      document.getElementById('feedback-icon').textContent = isCorrect ? '✅ Correto!' : '❌ Incorreto';
      document.getElementById('feedback-text').textContent = isCorrect
        ? 'Ótimo! Você acertou esta questão.'
        : `A resposta correta era: "${q.options[q.correct]}"`;

      document.getElementById('next-btn-wrap').classList.remove('hidden');
      document.getElementById('next-btn').innerHTML = current < questions.length - 1
        ? 'Próxima <i data-lucide="arrow-right" style="width:16px;height:16px;"></i>'
        : 'Ver Resultado <i data-lucide="trophy" style="width:16px;height:16px;"></i>';
      lucide.createIcons();
    }

    function nextQuestion() {
      current++;
      if (current < questions.length) {
        renderQuestion();
      } else {
        showResults();
      }
    }

    function showResults() {
      document.getElementById('quiz-screen').classList.add('hidden');
      const rs = document.getElementById('result-screen');
      rs.classList.remove('hidden');

      const pct = score / questions.length;
      document.getElementById('result-emoji').textContent = pct === 1 ? '🏆' : pct >= 0.5 ? '👏' : '📖';
      document.getElementById('result-score').textContent = score;
      document.getElementById('result-summary').textContent =
        pct === 1 ? 'Perfeito! Você acertou todas!' :
        pct >= 0.5 ? 'Bom trabalho! Continue estudando.' :
        'Não desanime! Tente novamente.';

      const bd = document.getElementById('result-breakdown');
      bd.innerHTML = '';
      results.forEach((r, i) => {
        const div = document.createElement('div');
        div.className = 'p-4 rounded-xl anim-fade-up';
        div.style.cssText = `background: rgba(255,255,255,0.03); border: 1px solid ${r.isCorrect ? 'rgba(5,150,105,0.3)' : 'rgba(220,38,38,0.3)'}; animation-delay: ${i * 0.15}s; opacity: 0;`;
        div.innerHTML = `
          <div class="flex items-start gap-3">
            <span class="flex-shrink-0 mt-0.5 text-lg">${r.isCorrect ? '✅' : '❌'}</span>
            <div class="min-w-0">
              <p class="text-sm font-semibold text-white mb-1 leading-snug">${r.question}</p>
              <p class="text-xs" style="color: ${r.isCorrect ? '#34d399' : '#f87171'};">
                ${r.isCorrect ? 'Correto' : `Sua resposta: ${questions[i].options[r.chosen]}`}
              </p>
              ${!r.isCorrect ? `<p class="text-xs mt-0.5" style="color: #34d399;">Resposta correta: ${questions[i].options[r.correct]}</p>` : ''}
            </div>
          </div>
        `;
        bd.appendChild(div);
      });
      lucide.createIcons();
    }

    function restartQuiz() {
      document.getElementById('result-screen').classList.add('hidden');
      document.getElementById('start-screen').classList.remove('hidden');
    }

    lucide.createIcons();
  </script>

</html>
